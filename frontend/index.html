<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KYB Compliance</title>
    <style>
      #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;transition:opacity .4s ease-out}
      #splash.hide{opacity:0;pointer-events:none}
      #splash svg{width:48px;height:48px;color:#1e40af;animation:pulse 1.8s ease-in-out infinite}
      #splash h1{margin-top:16px;font:700 20px/1 system-ui,sans-serif;color:#0f172a}
      #splash p{margin-top:6px;font:400 12px/1 system-ui,sans-serif;color:#64748b}
      #splash .bar{margin-top:24px;width:160px;height:3px;background:#e5e7eb;border-radius:4px;overflow:hidden}
      #splash .bar::after{content:'';display:block;width:40%;height:100%;background:#1e40af;border-radius:4px;animation:slide 1s ease-in-out infinite}
      @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
      @keyframes pulse{0%,100%{opacity:.7;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <h1>KYB Compliance</h1>
      <p>Cargando plataforma...</p>
      <div class="bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
