[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["app"]
omit = [
    "app/utils/csv_parser.py",
    "app/services/storage_service.py",
    "app/services/extraction_service.py",
]

[tool.ruff.lint]
ignore = ["F821"]

[tool.ruff.lint.per-file-ignores]
"app/models/dossier.py" = ["F821"]
